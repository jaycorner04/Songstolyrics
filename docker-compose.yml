services:
  song-to-lyrics:
    build: .
    container_name: song-to-lyrics
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      RUNTIME_ROOT: /data
      TRUST_PROXY: "true"
      ALLOW_BROWSER_COOKIES: "false"
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      LYRICS_OVH_BASE_URL: ${LYRICS_OVH_BASE_URL:-https://api.lyrics.ovh}
    volumes:
      - ./runtime:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
