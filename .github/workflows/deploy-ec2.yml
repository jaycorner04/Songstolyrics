name: Deploy To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-ec2-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          set -euo pipefail
          test -n "$EC2_HOST" || { echo "Missing GitHub secret: EC2_HOST"; exit 1; }
          test -n "$EC2_USER" || { echo "Missing GitHub secret: EC2_USER"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "Missing GitHub secret: EC2_SSH_KEY"; exit 1; }
          test -n "$EC2_APP_DIR" || { echo "Missing GitHub secret: EC2_APP_DIR"; exit 1; }

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$EC2_SSH_KEY" > "$HOME/.ssh/ec2_deploy_key"
          chmod 600 "$HOME/.ssh/ec2_deploy_key"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          if ! ssh-keyscan -T 15 -H "$EC2_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null; then
            echo "ssh-keyscan could not fetch host keys for $EC2_HOST; continuing with accept-new during ssh."
          fi

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_APP_URL: ${{ secrets.EC2_APP_URL }}
          EC2_APP_PORT: ${{ secrets.EC2_APP_PORT }}
          DEPLOY_BRANCH: main
        run: |
          set -euo pipefail
          APP_URL="${EC2_APP_URL:-http://127.0.0.1:${EC2_APP_PORT:-3000}}"
          SSH_OPTS="-i $HOME/.ssh/ec2_deploy_key -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o ConnectTimeout=20"

          ssh $SSH_OPTS "${EC2_USER}@${EC2_HOST}" <<EOF
          set -euo pipefail
          export APP_DIR="${EC2_APP_DIR}"
          export APP_URL="${APP_URL}"
          export DEPLOY_BRANCH="${DEPLOY_BRANCH}"
          cd "\$APP_DIR"
          git fetch origin "\$DEPLOY_BRANCH"
          git checkout "\$DEPLOY_BRANCH"
          git reset --hard "origin/\$DEPLOY_BRANCH"
          chmod +x scripts/deploy-remote.sh
          APP_URL="\$APP_URL" DEPLOY_BRANCH="\$DEPLOY_BRANCH" ./scripts/deploy-remote.sh
          EOF
